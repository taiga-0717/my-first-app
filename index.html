<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フラッシュ暗算</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --panel: #0d0d0d;
    --accent: #a8ff3e;
    --accent2: #ff4d6d;
    --accent3: #a8ff3e;
    --text: #a8ff3e;
    --muted: #4a6020;
    --border: #1a2a08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(168,255,62,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(168,255,62,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  #app {
    width: 100%;
    max-width: 480px;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Zen Dots', cursive;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-align: center;
    margin-bottom: 32px;
    text-shadow: 0 0 20px rgba(168,255,62,0.5);
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* CONFIG SCREEN */
  .config-grid {
    display: grid;
    gap: 16px;
  }

  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
  }

  .config-label {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .config-value {
    font-family: 'Zen Dots', cursive;
    font-size: 1.1rem;
    color: var(--accent);
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    background: var(--border);
    border: 1px solid var(--muted);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-sm:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .btn-start {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    font-family: 'Zen Dots', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    box-shadow: 0 0 24px rgba(168,255,62,0.3);
  }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(168,255,62,0.5);
  }

  

  /* GAME SCREEN */
  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px var(--accent);  }

  .round-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .flash-display {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .flash-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(168,255,62,0.04), transparent);
  }

  .flash-number {
    font-family: 'Zen Dots', cursive;
    font-size: 4rem;
    color: var(--text);
    line-height: 1;
    transition: opacity 0.08s;
    position: relative;
    z-index: 1;
  }

  .flash-number.hide { opacity: 0; }

  .flash-operator {
    font-size: 1.2rem;
    color: var(--accent3);
    margin-top: 8px;
    font-family: 'Zen Dots', cursive;
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
  }

  .flash-counter {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Zen Dots', cursive;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ANSWER INPUT */
  .answer-section {
    display: none;
  }
  .answer-section.visible {
    display: block;
  }

  .answer-prompt {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .answer-input {
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-family: 'Zen Dots', cursive;
    font-size: 2rem;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent); animation: flash-green 0.4s; }
  .answer-input.wrong { border-color: var(--accent2); animation: shake 0.4s; }

  @keyframes flash-green {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 24px rgba(168,255,62,0.6); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .btn-submit {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 12px;
    font-family: 'Zen Dots', cursive;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .btn-submit:hover { background: rgba(0,245,196,0.1); }

  /* RESULT SCREEN */
  .result-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-score {
    font-family: 'Zen Dots', cursive;
    font-size: 4rem;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(168,255,62,0.5);
    line-height: 1;
  }

  .result-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .result-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .result-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .result-item:last-child { border-bottom: none; }

  .result-item .numbers { color: var(--muted); font-size: 0.8rem; }
  .result-item .your-ans { font-family: 'Zen Dots', cursive; font-size: 0.9rem; }
  .result-item .correct-ans { font-family: 'Zen Dots', cursive; font-size: 0.9rem; color: var(--accent); }
  .result-item .mark { font-size: 1rem; }
  .result-item.wrong-row .your-ans { color: var(--accent2); }
  .result-item.correct-row .your-ans { color: var(--accent); }

  .btn-retry {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    font-family: 'Zen Dots', cursive;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    box-shadow: 0 0 24px rgba(168,255,62,0.3);
  }
  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(168,255,62,0.5); }
</style>
</head>
<body>
<div id="app">
  <h1>⚡ フラッシュ暗算</h1>

  <!-- CONFIG SCREEN -->
  <div id="screen-config" class="screen active">
    <div class="config-grid">

      <div class="config-row">
        <span class="config-label">数字の桁数</span>
        <div class="btn-group">
          <button class="btn-sm" onclick="adjust('digits',-1)">−</button>
          <span class="config-value" id="val-digits">2</span>
          <button class="btn-sm" onclick="adjust('digits',1)">＋</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-label">問題数</span>
        <div class="btn-group">
          <button class="btn-sm" onclick="adjust('count',-1)">−</button>
          <span class="config-value" id="val-count">5</span>
          <button class="btn-sm" onclick="adjust('count',1)">＋</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-label">表示時間 (秒)</span>
        <div class="btn-group">
          <button class="btn-sm" onclick="adjust('speed',-1)">−</button>
          <span class="config-value" id="val-speed">1.0</span>
          <button class="btn-sm" onclick="adjust('speed',1)">＋</button>
        </div>
      </div>



    </div>
    <button class="btn-start" onclick="startGame()">スタート ▶</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="round-info">
      <span id="round-label">問題 1 / 5</span>
      <span id="score-label">0 正解</span>
    </div>
    <div class="flash-display">
      <div class="flash-counter" id="flash-counter"></div>
      <div class="flash-number" id="flash-number">3</div>
      <div class="flash-operator" id="flash-operator"></div>
    </div>
    <div class="answer-section" id="answer-section">
      <div class="answer-prompt">答えは？</div>
      <input type="number" class="answer-input" id="answer-input" placeholder="0" inputmode="numeric"
             onkeydown="if(event.key==='Enter') submitAnswer()">
      <button class="btn-submit" onclick="submitAnswer()">決定 →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <div class="result-score" id="result-score">0 / 0</div>
      <div class="result-label" id="result-msg">結果</div>
    </div>
    <div class="result-list" id="result-list"></div>
    <button class="btn-retry" onclick="showConfig()">もう一度 ↩</button>
  </div>

</div>

<script>
  // CONFIG STATE
  const cfg = { digits: 2, count: 5, speed: 1.0, ops: ['+'] };  const limits = { digits:[1,4], count:[3,10], speed:[0.3,3.0] };
  const steps  = { digits:1, count:1, speed:0.1 };

  function adjust(key, dir) {
    const [mn,mx] = limits[key];
    cfg[key] = Math.min(mx, Math.max(mn, +(cfg[key] + dir * steps[key]).toFixed(1)));
    document.getElementById('val-' + key).textContent =
      key === 'speed' ? cfg[key].toFixed(1) : cfg[key];
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showConfig() { showScreen('screen-config'); }

  // GAME STATE
  let questions = [];
  let current = 0;
  let score = 0;
  let flashIndex = 0;
  let flashTimer = null;
  let progressTimer = null;
  let progressStart = null;

  function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }

  function generateQuestion() {
    const op = cfg.ops[Math.floor(Math.random()*cfg.ops.length)];
    const base = Math.pow(10, cfg.digits - 1);
    const top  = Math.pow(10, cfg.digits) - 1;
    let a = randInt(base, top);
    let b = randInt(base, top);
    let ans, display;

    if (op === '+') { ans = a + b; display = `${a} ＋ ${b}`; }
    else if (op === '-') {
      if (a < b) [a,b] = [b,a];
      ans = a - b; display = `${a} − ${b}`;
    } else if (op === '*') {
      b = randInt(2, 9); // 掛け算は小さく
      ans = a * b; display = `${a} × ${b}`;
    } else {
      // 割り切れる問題を生成
      b = randInt(2, 9);
      a = b * randInt(base, Math.min(top, 99));
      ans = a / b; display = `${a} ÷ ${b}`;
    }
    return { nums: [a, b], op, ans, display };
  }

  function startGame() {
    questions = Array.from({length: cfg.count}, generateQuestion);
    current = 0;
    score = 0;
    showScreen('screen-game');
    runRound();
  }

  function runRound() {
    const q = questions[current];
    document.getElementById('round-label').textContent = `問題 ${current+1} / ${cfg.count}`;
    document.getElementById('score-label').textContent = `${score} 正解`;
    document.getElementById('progress-bar').style.width = `${(current/cfg.count)*100}%`;
    document.getElementById('answer-section').classList.remove('visible');
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').classList.remove('correct','wrong');
    document.getElementById('flash-operator').textContent = '';

    // Flash the numbers
    const nums = [q.nums[0], opSymbol(q.op), q.nums[1]];
    flashIndex = 0;
    flashSequence(nums, q);
  }

  function opSymbol(op) {
    return {'+':'＋','-':'−','*':'×','/':'÷'}[op];
  }

  function flashSequence(items, q) {
    if (flashIndex >= items.length) {
      // Show answer input
      document.getElementById('flash-number').textContent = '？';
      document.getElementById('flash-counter').textContent = '';
      document.getElementById('answer-section').classList.add('visible');
      setTimeout(() => document.getElementById('answer-input').focus(), 50);
      return;
    }

    const item = items[flashIndex];
    const numEl = document.getElementById('flash-number');
    const cntEl = document.getElementById('flash-counter');

    numEl.classList.add('hide');
    setTimeout(() => {
      if (typeof item === 'number') {
        numEl.textContent = item;
        document.getElementById('flash-operator').textContent = '';
        cntEl.textContent = `${flashIndex === 0 ? 1 : 3} / 3`;
      } else {
        numEl.textContent = item;
        document.getElementById('flash-operator').textContent = '';
        cntEl.textContent = `2 / 3`;
      }
      numEl.classList.remove('hide');
      flashIndex++;
      flashTimer = setTimeout(() => flashSequence(items, q), cfg.speed * 1000);
    }, 80);
  }

  function submitAnswer() {
    clearTimeout(flashTimer);
    const input = document.getElementById('answer-input');
    const val = parseInt(input.value, 10);
    const q = questions[current];

    if (isNaN(val)) { input.focus(); return; }

    if (val === q.ans) {
      score++;
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
    }

    q.userAns = val;
    current++;

    setTimeout(() => {
      if (current >= cfg.count) {
        showResult();
      } else {
        runRound();
      }
    }, 500);
  }

  function showResult() {
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('result-score').textContent = `${score} / ${cfg.count}`;

    const pct = score / cfg.count;
    let msg = pct === 1 ? '🎉 パーフェクト！' : pct >= 0.8 ? '✨ 素晴らしい！' : pct >= 0.5 ? '👍 よくできました' : '💪 もう一度挑戦！';
    document.getElementById('result-msg').textContent = msg;

    const list = document.getElementById('result-list');
    list.innerHTML = questions.map((q, i) => {
      const ok = q.userAns === q.ans;
      return `<div class="result-item ${ok?'correct-row':'wrong-row'}">
        <span class="numbers">${q.display}</span>
        <span class="your-ans">${q.userAns ?? '—'}</span>
        <span class="mark">${ok ? '✅' : `❌ <span class="correct-ans">${q.ans}</span>`}</span>
      </div>`;
    }).join('');

    showScreen('screen-result');
  }
</script>
</body>
</html>
